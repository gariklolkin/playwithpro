name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: postgresql://playwithpro:playwithpro@localhost:5432/playwithpro

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: playwithpro
          POSTGRES_PASSWORD: playwithpro
          POSTGRES_DB: playwithpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U playwithpro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm exec prisma migrate deploy
        working-directory: apps/api

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
