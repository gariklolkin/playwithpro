services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playwithpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playwithpro}
      POSTGRES_DB: ${POSTGRES_DB:-playwithpro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playwithpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playwithpro}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playwithpro123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playwithpro}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playwithpro123}
      S3_BUCKET: ${S3_BUCKET:-playwithpro-videos}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    image: playwithpro-api:dev
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-playwithpro}:${POSTGRES_PASSWORD:-playwithpro}@postgres:5432/${POSTGRES_DB:-playwithpro}
      PORT: 4000
      WEB_APP_URL: http://localhost:3000
      # Mail goes container-to-container (host .env points at localhost).
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      # Storage goes container-to-container; browsers use the host-published URL.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_BUCKET: ${S3_BUCKET:-playwithpro-videos}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-playwithpro}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-playwithpro123}
    ports:
      - "4000:4000"

  web:
    image: playwithpro-web:dev
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    env_file:
      - path: ../.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      # Server-side fetches go container-to-container.
      API_URL_INTERNAL: http://api:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
