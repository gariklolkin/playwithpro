services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-topspin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topspin}
      POSTGRES_DB: ${POSTGRES_DB:-topspin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topspin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-topspin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-topspin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-topspin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-topspin123}
      S3_BUCKET: ${S3_BUCKET:-topspin-videos}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    image: topspin-api:dev
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-topspin}:${POSTGRES_PASSWORD:-topspin}@postgres:5432/${POSTGRES_DB:-topspin}
      PORT: 4000
      WEB_APP_URL: http://localhost:3000
    ports:
      - "4000:4000"

  web:
    image: topspin-web:dev
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    env_file:
      - path: ../.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
